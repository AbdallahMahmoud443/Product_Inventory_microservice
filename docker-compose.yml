services:
  # Laravel App
  inventory-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: Abdallah
        uid: 1000
    image: inventory-app
    container_name: inventory-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: inventory-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-network

  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: inventory-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-db_inventory_microservice}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - laravel-network

  # Redis
  redis:
    image: redis:alpine
    container_name: inventory-redis 
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  db-data:
    driver: local
